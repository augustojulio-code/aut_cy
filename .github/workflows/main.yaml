name: Cypress CI

on:
  push:
    branches:
      - master
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - master
      - develop
  repository_dispatch:
    types: [run-tests]

jobs:

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/feature/') ||
      startsWith(github.ref, 'refs/heads/fix/') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Run Smoke Tests
        uses: cypress-io/github-action@v6
        with:
          install-command: npm ci
          command: npm run test:smoke
        env:
          CYPRESS_USUARIO_PADRAO: ${{ secrets.CYPRESS_USUARIO_PADRAO }}
          CYPRESS_USUARIO_BLOQUEADO: ${{ secrets.CYPRESS_USUARIO_BLOQUEADO }}
          CYPRESS_SENHA: ${{ secrets.CYPRESS_SENHA }}

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-allure-report
          path: allure-report

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke
    if: |
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/develop' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Run Regression Tests
        uses: cypress-io/github-action@v6
        with:
          install-command: npm ci
          command: npm run test
        env:
          CYPRESS_USUARIO_PADRAO: ${{ secrets.CYPRESS_USUARIO_PADRAO }}
          CYPRESS_USUARIO_BLOQUEADO: ${{ secrets.CYPRESS_USUARIO_BLOQUEADO }}
          CYPRESS_SENHA: ${{ secrets.CYPRESS_SENHA }}

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-allure-report
          path: allure-report
