name: Cypress CI

on:
  push:
    branches:
      - master
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - master
      - develop
  repository_dispatch:
    types: [run-smoke, run-regression, run-zephyr]

jobs:

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/heads/feature/') ||
      startsWith(github.ref, 'refs/heads/fix/') ||
      github.event_name == 'pull_request' ||
      github.event.action == 'run-smoke'
    steps:
      - uses: actions/checkout@v4

      - name: Run Smoke Tests
        uses: cypress-io/github-action@v6
        with:
          install-command: npm ci
          command: npm run test:smoke
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_USUARIO_PADRAO: ${{ secrets.CYPRESS_USUARIO_PADRAO }}
          CYPRESS_USUARIO_BLOQUEADO: ${{ secrets.CYPRESS_USUARIO_BLOQUEADO }}
          CYPRESS_SENHA: ${{ secrets.CYPRESS_SENHA }}


  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    # Paralelismo por grupo de features - descomentar quando houver mais features organizadas em pastas
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     group: [auth, checkout, product, cart]
    if: |
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/develop' ||
      github.event.action == 'run-regression' ||
      github.event.action == 'run-zephyr'
    steps:
      - uses: actions/checkout@v4

      - name: Run Regression Tests
        # Com paralelismo: Run Regression Tests - ${{ matrix.group }}
        uses: cypress-io/github-action@v6
        with:
          install-command: npm ci
          command: npm run test
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_USUARIO_PADRAO: ${{ secrets.CYPRESS_USUARIO_PADRAO }}
          CYPRESS_USUARIO_BLOQUEADO: ${{ secrets.CYPRESS_USUARIO_BLOQUEADO }}
          CYPRESS_SENHA: ${{ secrets.CYPRESS_SENHA }}
          # Com paralelismo: CYPRESS_GROUP: ${{ matrix.group }}

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

